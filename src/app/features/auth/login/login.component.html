<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 w-full">
  <div class="rounded-4xl bg-bg border border-border p-5 flex flex-col gap-4">
    <app-title class="text-center" [title]="loginTitle" />
    <app-input [input]="emailInput" [formGroup]="loginForm" />
    <app-input [input]="passwordInput" [formGroup]="loginForm" />
    <p class="text-text text-sm">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="cursor-pointer underline text-primary">Regístrate</a>
    </p>
  </div>

  <button
    type="submit"
    class="p-4 w-full text-center bg-primary rounded-3xl text-text font-semibold cursor-pointer"
  >
    Entrar
  </button>
</form>
