<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 w-full">
  <div class="rounded-4xl bg-bg border border-border p-5 flex flex-col gap-4">
    <app-title class="text-center" [title]="registerTitle" />
    <app-input [input]="userInput" [formGroup]="registerForm" />
    <app-input [input]="emailInput" [formGroup]="registerForm" />
    <app-input [input]="passwordInput" [formGroup]="registerForm" />
    <app-input [input]="repeatPasswordInput" [formGroup]="registerForm" />
    <p class="text-text text-sm">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login" class="cursor-pointer underline text-primary">Inicia Sesión</a>
    </p>
  </div>

  <button
    type="submit"
    class="p-4 w-full text-center bg-primary rounded-3xl text-text font-semibold cursor-pointer"
  >
    Crear cuenta
  </button>
</form>
