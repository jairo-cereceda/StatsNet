@let sf = form();

@if (sf) {
  <form [formGroup]="formGroup" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      @for (input of sf.inputs; track input.id) {
        <app-input [input]="input" />
      }
    </div>

    <button
      type="submit"
      class="w-full text-center p-4 bg-accent rounded-3xl font-semibold text-text cursor-pointer active:bg-accent-active"
      [disabled]="formGroup.invalid"
      (click)="formGroup.valid ? sf?.onSubmit() : null"
    >
      Publicar
    </button>
  </form>
}
