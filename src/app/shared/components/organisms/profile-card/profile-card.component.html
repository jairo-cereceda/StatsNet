<div
  class="flex items-center justify-start p-4 rounded-2xl border-border border-2 bg-surface w-full gap-3"
>
  <img [src]="profileCard()?.userImage" alt="" class="w-28 h-28 object-cover rounded-full" />

  <div class="grid grid-rows-2">
    <app-title [title]="profileCard()?.userName" />

    @if (profileCard()?.isLoggedAccount) {
      <app-button [button]="profileCard()?.editProfileButton" />
    }
  </div>
</div>
